<header class="header">
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <img src="/Logowit.png" alt="Adoptie Schoten Logo" class="logo-image">
        <span class="logo-text">Adoptie Schoten</span>
      </div>
      
      <ul class="nav-menu">
        <li class="nav-item" *ngFor="let item of navItems">
          <a 
            [routerLink]="item.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link">
            {{ item.label }}
          </a>
        </li>
      </ul>
    </div>
  </nav>
</header>
